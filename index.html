<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ready Reckoner — Lane Yield Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* Ready Reckoner — Lane Yield Tracker */

:root {
  --bg:           #F4F1E8;
  --bg-warm:      #EDE8DA;
  --surface:      #FFFFFF;
  --surface-2:    #FAF7EE;
  --surface-3:    #F1ECDD;
  --border:       #E2DBC7;
  --border-soft:  #EDE7D4;
  --border-strong:#B6AC91;
  --text:         #19140C;
  --text-mid:     #4A4435;
  --text-mut:     #7A715E;
  --text-faint:   #A39A85;
  --primary:      #1B3A55;
  --primary-hover:#264D6E;
  --primary-soft: #DEE6EE;
  --accent:       #B85C36;
  --accent-soft:  #F2DECE;
  --success:      #2F6B43;
  --success-soft: #D7E7DC;
  --warn:         #9C7314;
  --warn-soft:    #F2E5BF;
  --danger:       #A8362C;
  --danger-soft:  #F1D6D1;
  --shadow-sm: 0 1px 0 rgba(25, 20, 12, 0.04), 0 1px 2px rgba(25, 20, 12, 0.05);
  --shadow-md: 0 2px 4px rgba(25, 20, 12, 0.04), 0 6px 18px -8px rgba(25, 20, 12, 0.12);
  --shadow-lg: 0 8px 24px -6px rgba(25, 20, 12, 0.16), 0 24px 56px -16px rgba(25, 20, 12, 0.22);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: 'Geist', -apple-system, system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'ss01' on, 'cv11' on;
}

.mono {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-feature-settings: 'tnum' on, 'ss01' on;
}

/* ── App shell ───────────────────────────────────── */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 30;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.brand-mark {
  width: 32px;
  height: 32px;
  background: var(--primary);
  border-radius: 8px;
  display: grid;
  place-items: center;
  color: #fff;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.02em;
}
.brand-mark .accent-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 999px;
  position: absolute;
  transform: translate(8px, 8px);
}
.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.015em;
  line-height: 1;
}
.brand-sub {
  font-size: 11px;
  color: var(--text-mut);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 3px;
}

.topbar-divider {
  width: 1px;
  height: 26px;
  background: var(--border);
}

.topbar-tabs {
  display: flex;
  gap: 2px;
  flex: 1;
}
.tab {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-mut);
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab:hover { background: var(--surface-3); color: var(--text); }
.tab.active { background: var(--primary-soft); color: var(--primary); }
.tab-count {
  font-size: 11px;
  background: rgba(0,0,0,0.05);
  padding: 1px 6px;
  border-radius: 999px;
  font-family: 'Geist Mono', monospace;
}
.tab.active .tab-count { background: rgba(27, 58, 85, 0.12); }

.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px 5px 5px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.user-pill:hover { background: var(--surface-3); }
.user-avatar {
  width: 24px;
  height: 24px;
  border-radius: 999px;
  background: var(--primary);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.user-name { font-weight: 500; }
.user-role { color: var(--text-mut); }

/* ── Buttons ─────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: background 80ms ease, border-color 80ms ease;
}
.btn:hover { background: var(--surface-3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-accent:hover { filter: brightness(1.05); }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--surface-3); }
.btn-danger {
  background: #fff;
  border-color: var(--danger-soft);
  color: var(--danger);
}
.btn-danger:hover { background: var(--danger-soft); }
.btn-sm { padding: 4px 9px; font-size: 12px; }
.btn-xs { padding: 2px 7px; font-size: 11px; border-radius: 6px; }
.btn-icon { padding: 6px; }

/* ── Main content ────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.actionbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border-soft);
}
.stat-group {
  display: flex;
  gap: 18px;
  margin-right: auto;
}
.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-mut);
  white-space: nowrap;
}
.stat-val {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.02em;
  font-family: 'Geist Mono', monospace;
  font-feature-settings: 'tnum' on;
  line-height: 1;
  white-space: nowrap;
}
.stat-val .unit {
  font-size: 11px;
  color: var(--text-mut);
  margin-left: 3px;
  font-weight: 400;
}

.search-input {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  width: 280px;
}
.search-input input {
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  flex: 1;
  color: var(--text);
}
.search-input svg { color: var(--text-mut); flex-shrink: 0; }

/* ── Records table ───────────────────────────────── */
.table-wrap {
  flex: 1;
  overflow: auto;
  padding: 0 24px 64px;
}

.records-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 16px;
  font-size: 13px;
}

.records-table thead th {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 5;
  text-align: left;
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-mut);
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-strong);
  white-space: nowrap;
}
.records-table thead th.num { text-align: right; }
.records-table thead .group-fwd { color: var(--primary); background: var(--bg); }
.records-table thead .group-ret { color: var(--accent); background: var(--bg); }

.fwd-row {
  background: var(--surface);
  cursor: pointer;
}
.fwd-row td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--border-soft);
  vertical-align: middle;
}
.fwd-row:hover { background: var(--surface-2); }
.fwd-row.expanded { background: var(--surface-2); }
.fwd-row.expanded td { border-bottom-color: var(--border); }

.fwd-customer {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 220px;
}
.chevron {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  display: grid;
  place-items: center;
  color: var(--text-mut);
  transition: transform 120ms ease;
  flex-shrink: 0;
}
.fwd-row.expanded .chevron { transform: rotate(90deg); color: var(--primary); }
.fwd-customer-text {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.fwd-customer-name {
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}
.fwd-lane {
  font-size: 12px;
  color: var(--text-mut);
}

.num { text-align: right; font-family: 'Geist Mono', monospace; font-feature-settings: 'tnum' on; }
.num-strong { font-weight: 500; }
.range-cell { color: var(--text-mid); font-size: 12px; }

.yield-chip {
  display: inline-flex;
  align-items: baseline;
  gap: 2px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-family: 'Geist Mono', monospace;
  font-feature-settings: 'tnum' on;
  font-weight: 500;
}
.yield-chip.high { background: var(--success-soft); color: var(--success); }
.yield-chip.mid  { background: var(--warn-soft);    color: var(--warn); }
.yield-chip.low  { background: var(--danger-soft);  color: var(--danger); }
.yield-chip .pct { font-size: 10px; opacity: 0.7; }

.priority-count {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}

.row-actions {
  display: flex;
  gap: 4px;
  justify-content: flex-end;
  opacity: 0;
  transition: opacity 80ms ease;
}
.fwd-row:hover .row-actions,
.fwd-row.expanded .row-actions { opacity: 1; }

/* Return rows nested under expanded forward */
.returns-wrap td {
  padding: 0 !important;
  background: var(--surface-3);
  border-bottom: 1px solid var(--border-soft) !important;
}
.returns-inner {
  padding: 12px 12px 16px 44px;
}
.returns-table {
  width: 100%;
  font-size: 12px;
  border-collapse: separate;
  border-spacing: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.returns-table th {
  text-align: left;
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-mut);
  padding: 8px 10px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-soft);
}
.returns-table th.num { text-align: right; }
.returns-table td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border-soft);
}
.returns-table tr:last-child td { border-bottom: none; }

.pri-badge {
  display: inline-grid;
  place-items: center;
  width: 24px;
  height: 22px;
  padding: 0 6px;
  background: var(--primary);
  color: #fff;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 600;
  font-family: 'Geist Mono', monospace;
  letter-spacing: 0;
}
.pri-badge.p1 { background: var(--accent); }
.pri-badge.p2 { background: var(--primary); }
.pri-badge.p3, .pri-badge.p4, .pri-badge.p5,
.pri-badge.p6, .pri-badge.p7, .pri-badge.p8,
.pri-badge.p9, .pri-badge.p10, .pri-badge.p11,
.pri-badge.p12, .pri-badge.p13, .pri-badge.p14,
.pri-badge.p15, .pri-badge.p16, .pri-badge.p17, .pri-badge.p18 {
  background: var(--text-mut);
}

.meta-row {
  display: flex;
  gap: 14px;
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-mut);
  padding-left: 6px;
}
.meta-row b { font-weight: 500; color: var(--text-mid); }

.empty {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-mut);
}
.empty h3 { color: var(--text); margin: 8px 0 4px; font-weight: 500; }

/* ── Drawer (form) ───────────────────────────────── */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(25, 20, 12, 0.32);
  z-index: 40;
  animation: fadein 140ms ease;
}
.drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(960px, 96vw);
  background: var(--bg);
  z-index: 50;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slidein 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes fadein  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slidein { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

.drawer-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-title-block { flex: 1; min-width: 0; }
.drawer-eyebrow {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-mut);
}
.drawer-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.015em;
  line-height: 1.2;
  margin-top: 2px;
}

.drawer-body {
  flex: 1;
  overflow: auto;
  padding: 24px;
}

.drawer-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.drawer-footer .footer-meta {
  margin-right: auto;
  font-size: 11px;
  color: var(--text-mut);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 18px;
}
.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.section-marker {
  width: 4px;
  height: 18px;
  border-radius: 2px;
  background: var(--primary);
}
.section-marker.accent { background: var(--accent); }
.section-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.section-sub {
  font-size: 11px;
  color: var(--text-mut);
  margin-left: auto;
}

.field-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field.col-12 { grid-column: span 12; }
.field.col-6 { grid-column: span 6; }
.field.col-4 { grid-column: span 4; }
.field.col-3 { grid-column: span 3; }
.field.col-2 { grid-column: span 2; }

.field label {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-mut);
}
.field label .req { color: var(--accent); }
.field label .hint { color: var(--text-faint); text-transform: none; letter-spacing: 0; font-weight: 400; margin-left: 4px; }

.field input,
.field select,
.field textarea {
  font-family: inherit;
  font-size: 13px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  outline: none;
  transition: border-color 80ms ease, box-shadow 80ms ease;
}
.field input.num { text-align: right; font-family: 'Geist Mono', monospace; }
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-soft);
}
.field.derived input {
  background: var(--surface-2);
  color: var(--text-mid);
  border-style: dashed;
}

.field-suffix {
  position: relative;
}
.field-suffix .suffix {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--text-faint);
  pointer-events: none;
  font-family: 'Geist Mono', monospace;
}
.field-suffix input { padding-right: 36px; }

/* Returns editor */
.returns-editor {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.return-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}
.return-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.return-card-head .drag {
  cursor: grab;
  color: var(--text-faint);
  padding: 2px;
}
.return-card-head .pri-badge { margin-right: 4px; }
.return-card-head input {
  flex: 1;
  font-size: 13px;
  padding: 6px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  outline: none;
}
.return-card-head input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

.add-priority {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: transparent;
  border: 1px dashed var(--border-strong);
  border-radius: 10px;
  color: var(--text-mut);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.add-priority:hover { background: var(--surface-2); color: var(--primary); border-color: var(--primary); }

/* ── Import view ─────────────────────────────────── */
.import-pane {
  flex: 1;
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  max-width: 980px;
}

.import-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.import-card-head {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}
.import-card-head h3 {
  margin: 0 0 4px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.import-card-head p {
  margin: 0;
  font-size: 12px;
  color: var(--text-mut);
}
.import-card-body { padding: 22px; }

.dropzone {
  border: 1.5px dashed var(--border-strong);
  border-radius: 10px;
  padding: 32px 24px;
  text-align: center;
  background: var(--surface-2);
  cursor: pointer;
  transition: background 80ms ease, border-color 80ms ease;
}
.dropzone:hover, .dropzone.dragging {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.dropzone svg { color: var(--text-mut); }
.dropzone h4 { margin: 12px 0 4px; font-size: 14px; font-weight: 500; }
.dropzone p { margin: 0; font-size: 12px; color: var(--text-mut); }

.schema-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 28px;
  margin-top: 8px;
}
.schema-col h5 {
  margin: 0 0 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.schema-col h5.fwd { color: var(--primary); }
.schema-col h5.ret { color: var(--accent); }
.schema-list { list-style: none; padding: 0; margin: 0; font-size: 12px; }
.schema-list li {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid var(--border-soft);
  color: var(--text-mid);
}
.schema-list li:last-child { border-bottom: none; }
.schema-list .col-letter {
  font-family: 'Geist Mono', monospace;
  color: var(--text-faint);
  font-size: 11px;
}

.import-preview {
  margin-top: 22px;
  border-top: 1px solid var(--border);
  padding-top: 18px;
}
.import-preview h4 {
  margin: 0 0 12px;
  font-size: 13px;
  font-weight: 600;
}
.import-summary {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
}
.import-summary .stat {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  flex: 1;
}

/* ── Toast ──────────────────────────────────────── */
.toast-stack {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--text);
  color: #fff;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow-md);
  min-width: 240px;
  animation: toastin 160ms ease;
}
.toast.success { background: var(--success); }
.toast.error   { background: var(--danger); }
@keyframes toastin {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: none; opacity: 1; }
}

/* ── Login modal ────────────────────────────────── */
.login-overlay {
  position: fixed;
  inset: 0;
  background: rgba(25, 20, 12, 0.5);
  z-index: 200;
  display: grid;
  place-items: center;
}
.login-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 28px;
  width: 380px;
  box-shadow: var(--shadow-lg);
}
.login-card h2 {
  margin: 16px 0 4px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.015em;
}
.login-card p {
  margin: 0 0 18px;
  color: var(--text-mut);
  font-size: 13px;
}
.login-card .field { margin-bottom: 12px; }
.user-picker {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 14px;
}
.user-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  background: var(--surface);
}
.user-option:hover { background: var(--surface-2); }
.user-option.selected { border-color: var(--primary); background: var(--primary-soft); }
.user-option .user-avatar { width: 30px; height: 30px; font-size: 11px; }
.user-option-meta { display: flex; flex-direction: column; min-width: 0; flex: 1 1 auto; }
.user-option-name { font-weight: 500; font-size: 13px; white-space: nowrap; }
.user-option-role { font-size: 11px; color: var(--text-mut); white-space: nowrap; }

/* ── Util ───────────────────────────────────────── */
.spacer { flex: 1; }
.divider { height: 1px; background: var(--border); margin: 18px 0; }
.kbd {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  background: var(--surface-3);
  padding: 1px 5px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  <script>
// Excel import/export using SheetJS (window.XLSX)
// Schema mirrors Ready_Reckoner.xlsx exactly.

(function () {
  const FWD_COLS = [
    { key: 'customer',     label: 'Customer' },
    { key: 'lane',         label: 'Lane' },
    { key: 'febLoad',      label: 'Feb Load' },
    { key: 'distanceKms',  label: 'Distance-KMS (Actuals)' },
    { key: 'yieldPct',     label: 'Yield' },
    { key: 'minKms',       label: 'Min-KMS' },
    { key: 'maxKms',       label: 'Max-KMS' },
  ];
  const RET_COLS = [
    { key: 'priority',        label: 'Priority' },
    { key: 'returnCustomer',  label: 'Return Customer' },
    { key: 'lane',            label: 'Lane' },
    { key: 'monthlyLoad',     label: 'Monthly Load - MT' },
    { key: 'distanceLoaded',  label: 'Distance Loaded - KMS' },
    { key: 'distanceEmpty',   label: 'Distance Empty' },
    { key: 'totalDistance',   label: 'Total Distance KMS' },
    { key: 'yieldPct',        label: 'Yield' },
    { key: 'blend',           label: 'Blend' },
  ];

  function nz(v) { return v === undefined || v === null || v === '' ? null : v; }

  // Parse from a workbook (already loaded via XLSX.read)
  function parseWorkbook(wb) {
    const sheet = wb.Sheets[wb.SheetNames[0]];
    // Get array-of-arrays
    const aoa = window.XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    // aoa[0] is the "Forward Lane | Return Lane" superheader; aoa[1] is the column header row.
    // Data starts at aoa[2]
    const records = [];
    let current = null;
    for (let i = 2; i < aoa.length; i++) {
      const row = aoa[i];
      if (!row || row.length === 0) continue;
      const [A, B, C, D, E, F, G, H, I, J, K, L, M, N, O, P] = row;
      const hasFwd = String(A ?? '').trim() !== '';
      if (hasFwd) {
        if (current) records.push(current);
        current = {
          forward: {
            customer: String(A).trim(),
            lane: String(B ?? '').trim(),
            febLoad: nz(C),
            distanceKms: nz(D),
            yieldPct: nz(E),
            minKms: nz(F),
            maxKms: nz(G),
          },
          returns: []
        };
      }
      if (!current) continue;
      const hasRet = (String(I ?? '').trim() !== '') || (String(J ?? '').trim() !== '') || (String(H ?? '').trim() !== '');
      if (hasRet) {
        current.returns.push({
          priority: String(H ?? '').trim() || null,
          returnCustomer: String(I ?? '').trim() || null,
          lane: String(J ?? '').trim() || null,
          monthlyLoad: nz(K),
          distanceLoaded: nz(L),
          distanceEmpty: nz(M),
          totalDistance: nz(N),
          yieldPct: nz(O),
          blend: nz(P),
        });
      }
    }
    if (current) records.push(current);
    return records;
  }

  async function parseFile(file) {
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf, { type: 'array' });
    return parseWorkbook(wb);
  }

  // Build a worksheet AOA matching the original layout
  function recordsToAOA(records) {
    const aoa = [];
    aoa.push(['Forward Lane (Customer Origin)', '', '', '', '', '', '', 'Return Lane (Backhaul)', '', '', '', '', '', '', '', '']);
    aoa.push([
      ...FWD_COLS.map(c => c.label),
      ...RET_COLS.map(c => c.label),
    ]);
    for (const rec of records) {
      const fwd = rec.forward || {};
      const rets = rec.returns && rec.returns.length ? rec.returns : [{}];
      rets.forEach((ret, idx) => {
        const row = idx === 0
          ? FWD_COLS.map(c => fwd[c.key] ?? '')
          : FWD_COLS.map(() => '');
        for (const c of RET_COLS) row.push(ret[c.key] ?? '');
        aoa.push(row);
      });
    }
    return aoa;
  }

  function exportRecords(records, filename) {
    const aoa = recordsToAOA(records);
    const ws = window.XLSX.utils.aoa_to_sheet(aoa);
    // Column widths roughly matching original
    ws['!cols'] = [
      { wch: 28 }, { wch: 36 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 11 }, { wch: 11 },
      { wch: 9 },  { wch: 28 }, { wch: 42 }, { wch: 13 }, { wch: 13 }, { wch: 13 }, { wch: 13 },
      { wch: 12 }, { wch: 12 }
    ];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, 'Ready Reckoner');
    window.XLSX.writeFile(wb, filename || 'Ready_Reckoner_Export.xlsx');
  }

  window.ExcelIO = { parseFile, parseWorkbook, exportRecords, FWD_COLS, RET_COLS };
})();

  </script>

  <script type="text/babel" data-presets="react">
/* Components: icons, table, return rows, etc. */
const { useState, useMemo, useRef, useEffect, useCallback } = React;

/* ───────────────── icons (inline SVG) ─────────────── */
const Icon = {
  Chevron: (p) => (

  Plus: (p) => (

  ),

  ),

  ),
  Trash: (p) => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
  ),
  Upload: (p) => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  ),
  Download: (p) => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  ),
  X: (p) => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  ),
  File: (p) => (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
  ),
  Drag: (p) => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" {...p}><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>
  ),
  Check: (p) => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>
  ),
};

/* ───────────────── formatters ─────────────── */
const fmt = {
  num(v, dp = 0) {
    if (v === null || v === undefined || v === '') return '—';
    const n = +v;
    if (isNaN(n)) return String(v);
    return n.toLocaleString('en-IN', { maximumFractionDigits: dp, minimumFractionDigits: dp });
  },
  pct(v) {
    if (v === null || v === undefined || v === '') return null;
    return +v;
  },
  range(min, max) {
    if (!min && !max) return '—';
    if (min == null) return `≤ ${fmt.num(max)}`;
    if (max == null) return `≥ ${fmt.num(min)}`;
    if (+min === +max) return fmt.num(min);
    return `${fmt.num(min)} – ${fmt.num(max)}`;
  },
  date(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  },
  dateShort(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
  },
};

function yieldTone(v) {
  if (v == null) return 'mid';
  if (v >= 78) return 'high';
  if (v >= 68) return 'mid';
  return 'low';
}

function YieldChip({ value }) {
  if (value == null || value === '') return <span className="num">—</span>;
  return (
    <span className={`yield-chip ${yieldTone(value)}`}>
      <span className="mono">{(+value).toFixed(1)}</span><span className="pct">%</span>
    </span>
  );
}

function PriBadge({ p }) {
  const k = String(p || '').toLowerCase();
  return <span className={`pri-badge ${k}`}>{p || '–'}</span>;
}

/* ───────────────── records table ─────────────── */
function RecordsTable({ records, onEdit, onDelete, onAdd, query }) {
  const [expanded, setExpanded] = useState(() => new Set());

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return records;
    return records.filter(r => {
      const hay = [
        r.forward?.customer, r.forward?.lane,
        ...(r.returns || []).flatMap(x => [x.returnCustomer, x.lane, x.priority])
      ].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }, [records, query]);

  const toggle = (id) => setExpanded(prev => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });

  if (!records.length) {
    return (
      <div className="empty">
        <Icon.File />
        <h3>No records yet</h3>
        <p>Add a record or import an existing Ready Reckoner spreadsheet.</p>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 16 }}>
          <button className="btn btn-primary" onClick={onAdd}><Icon.Plus/> New record</button>
        </div>
      </div>
    );
  }

  return (
    <div className="table-wrap">
      <table className="records-table">
        <thead>
          <tr>
            <th colSpan="4" className="group-fwd" style={{ borderBottom: '1px solid var(--border-soft)' }}>Forward Lane — Customer Origin</th>
            <th colSpan="3" className="group-ret" style={{ borderBottom: '1px solid var(--border-soft)' }}>Return Lane summary</th>
            <th></th>
          </tr>
          <tr>
            <th>Customer / Lane</th>
            <th className="num">Feb Load</th>
            <th className="num">Distance</th>
            <th className="num">Yield</th>
            <th>Priorities</th>
            <th className="num">Top blend</th>
            <th>Updated</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {filtered.map((rec) => {
            const isOpen = expanded.has(rec.id);
            const topBlend = (rec.returns || []).reduce((b, r) => r.blend != null && (b == null || r.blend > b) ? r.blend : b, null);
            return (
              <React.Fragment key={rec.id}>
                <tr className={`fwd-row ${isOpen ? 'expanded' : ''}`} onClick={() => toggle(rec.id)}>
                  <td>
                    <div className="fwd-customer">
                      <span className="chevron"><Icon.Chevron /></span>
                      <div className="fwd-customer-text">
                        <div className="fwd-customer-name">{rec.forward.customer || '—'}</div>
                        <div className="fwd-lane">{rec.forward.lane || '—'}</div>
                      </div>
                    </div>
                  </td>
                  <td className="num num-strong">{fmt.num(rec.forward.febLoad)}</td>
                  <td className="num range-cell">
                    <div>{fmt.num(rec.forward.distanceKms)} <span style={{ color: 'var(--text-faint)' }}>km</span></div>
                    <div style={{ fontSize: 11, color: 'var(--text-faint)' }}>{fmt.range(rec.forward.minKms, rec.forward.maxKms)}</div>
                  </td>
                  <td className="num"><YieldChip value={rec.forward.yieldPct} /></td>
                  <td>
                    <span className="priority-count">{(rec.returns || []).length} priorit{(rec.returns || []).length === 1 ? 'y' : 'ies'}</span>
                  </td>
                  <td className="num"><YieldChip value={topBlend} /></td>
                  <td style={{ fontSize: 12, color: 'var(--text-mut)' }}>
                    <div>{fmt.dateShort(rec.updatedAt || rec.createdAt)}</div>
                    <div style={{ fontSize: 11, color: 'var(--text-faint)' }}>by {rec.updatedBy || rec.createdBy || '—'}</div>
                  </td>
                  <td>
                    <div className="row-actions">
                      <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onEdit(rec); }} title="Edit"><Icon.Edit/> Edit</button>
                      <button className="btn btn-sm btn-danger btn-icon" onClick={(e) => { e.stopPropagation(); if (confirm(`Delete record for ${rec.forward.customer}?`)) onDelete(rec); }} title="Delete"><Icon.Trash/></button>
                    </div>
                  </td>
                </tr>
                {isOpen && (
                  <tr className="returns-wrap">
                    <td colSpan="8">
                      <div className="returns-inner">
                        <ReturnsTable returns={rec.returns || []} />
                        <div className="meta-row">
                          <span><b>Created</b> {fmt.date(rec.createdAt)} · <b>by</b> {rec.createdBy || '—'}</span>
                          {rec.updatedAt && rec.updatedAt !== rec.createdAt && (
                            <span><b>Updated</b> {fmt.date(rec.updatedAt)} · <b>by</b> {rec.updatedBy || '—'}</span>
                          )}
                          <span style={{ marginLeft: 'auto', fontFamily: 'Geist Mono, monospace', color: 'var(--text-faint)' }}>#{rec.id.slice(0, 8)}</span>
                        </div>
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
      {filtered.length === 0 && (
        <div className="empty">
          <p>No records match “{query}”.</p>
        </div>
      )}
    </div>
  );
}

function ReturnsTable({ returns }) {
  if (!returns.length) {
    return <div style={{ color: 'var(--text-mut)', fontSize: 12, padding: '8px 4px' }}>No return priorities defined.</div>;
  }
  return (
    <table className="returns-table">
      <thead>
        <tr>
          <th style={{ width: 50 }}>Pri</th>
          <th>Return Customer</th>
          <th>Lane</th>
          <th className="num">Monthly Load</th>
          <th className="num">Loaded</th>
          <th className="num">Empty</th>
          <th className="num">Total KMS</th>
          <th className="num">Yield</th>
          <th className="num">Blend</th>
        </tr>
      </thead>
      <tbody>
        {returns.map((r, i) => (
          <tr key={i}>
            <td><PriBadge p={r.priority}/></td>
            <td style={{ fontWeight: 500 }}>{r.returnCustomer || '—'}</td>
            <td style={{ color: 'var(--text-mid)' }}>{r.lane || '—'}</td>
            <td className="num">{fmt.num(r.monthlyLoad)} <span style={{ color: 'var(--text-faint)', fontSize: 10 }}>MT</span></td>
            <td className="num">{fmt.num(r.distanceLoaded)}</td>
            <td className="num">{fmt.num(r.distanceEmpty)}</td>
            <td className="num num-strong">{fmt.num(r.totalDistance)}</td>
            <td className="num"><YieldChip value={r.yieldPct} /></td>
            <td className="num"><YieldChip value={r.blend} /></td>
          </tr>
        ))}

}

/* ───────────────── login / user picker ─────────────── */

  <script type="text/babel" data-presets="react">
/* RecordFormDrawer — create/edit a record */
const { useState: useStateF, useEffect: useEffectF, useMemo: useMemoF, useRef: useRefF } = React;

function emptyReturn(priority) {
  return {
    priority: priority || 'P1',
    returnCustomer: '',
    lane: '',
    monthlyLoad: '',
    distanceLoaded: '',
    distanceEmpty: '',
    totalDistance: '',
    yieldPct: '',
    blend: '',
  };
}

function emptyRecord() {
  return {
    forward: {
      customer: '',
      lane: '',
      febLoad: '',
      distanceKms: '',
      yieldPct: '',
      minKms: '',
      maxKms: '',
    },
    returns: [emptyReturn('P1')],
  };
}

function NumInput({ value, onChange, placeholder, suffix, step }) {
  return (
    <div className={'field-suffix' + (suffix ? '' : '')}>
      <input
        type="number"
        className="num"
        value={value ?? ''}
        step={step || 'any'}
        placeholder={placeholder || ''}
        onChange={e => onChange(e.target.value === '' ? '' : +e.target.value)}
      />
      {suffix && <span className="suffix">{suffix}</span>}
    </div>
  );
}

function RecordFormDrawer({ initial, isNew, onSave, onCancel, currentUser }) {
  const [rec, setRec] = useStateF(() => {
    if (initial) return JSON.parse(JSON.stringify(initial));
    return emptyRecord();
  });

  const setF = (key, val) => setRec(r => ({ ...r, forward: { ...r.forward, [key]: val } }));
  const setR = (i, key, val) => setRec(r => ({
    ...r,
    returns: r.returns.map((x, idx) => idx === i ? { ...x, [key]: val } : x),
  }));

  // auto-fill total distance if loaded+empty present and total missing/derived
  useEffectF(() => {
    setRec(r => ({
      ...r,
      returns: r.returns.map(ret => {
        const l = +ret.distanceLoaded || 0;
        const e = +ret.distanceEmpty || 0;
        if (ret.distanceLoaded !== '' && ret.distanceEmpty !== '' && (ret.totalDistance === '' || +ret.totalDistance === (l + e) || ret._autoTotal)) {
          return { ...ret, totalDistance: l + e, _autoTotal: true };
        }
        return ret;
      }),
    }));
    // eslint-disable-next-line
  }, [JSON.stringify(rec.returns.map(r => [r.distanceLoaded, r.distanceEmpty]))]);

  const addReturn = () => setRec(r => {
    const nextP = 'P' + (r.returns.length + 1);
    return { ...r, returns: [...r.returns, emptyReturn(nextP)] };
  });

  const removeReturn = (i) => setRec(r => ({
    ...r,
    returns: r.returns.filter((_, idx) => idx !== i).map((ret, idx) => ({ ...ret, priority: 'P' + (idx + 1) })),
  }));

  const moveReturn = (i, dir) => setRec(r => {
    const next = [...r.returns];
    const j = i + dir;
    if (j < 0 || j >= next.length) return r;
    [next[i], next[j]] = [next[j], next[i]];
    return { ...r, returns: next.map((x, idx) => ({ ...x, priority: 'P' + (idx + 1) })) };
  });

  const canSave = !!(rec.forward.customer && rec.forward.customer.trim());

  const handleSave = () => {
    // strip empty trailing returns where everything's blank
    const cleanRets = rec.returns
      .map(r => {
        const { _autoTotal, ...rest } = r;
        return rest;
      })
      .filter(r => Object.values(r).some(v => v !== '' && v !== null));
    const payload = {
      ...rec,
      returns: cleanRets,
    };
    onSave(payload);
  };

  return (
    <>
      <div className="drawer-overlay" onClick={onCancel} />
      <div className="drawer" role="dialog" aria-modal="true">
        <div className="drawer-header">
          <div className="drawer-title-block">
            <div className="drawer-eyebrow">{isNew ? 'New record' : 'Edit record'}</div>
            <div className="drawer-title">
              {rec.forward.customer || (isNew ? 'Add Forward Lane' : 'Untitled lane')}
              {rec.forward.lane && <span style={{ color: 'var(--text-mut)', fontWeight: 400, marginLeft: 8 }}> · {rec.forward.lane}</span>}
            </div>
          </div>
          <button className="btn btn-ghost btn-icon" onClick={onCancel} title="Close"><Icon.X/></button>
        </div>

        <div className="drawer-body">
          {/* Forward */}
          <div className="section">
            <div className="section-head">
              <div className="section-marker"/>
              <div className="section-title">Forward Lane — Customer Origin</div>
              <div className="section-sub">The originating customer & route</div>
            </div>
            <div className="field-grid">
              <div className="field col-6">
                <label>Customer <span className="req">*</span></label>
                <input type="text" value={rec.forward.customer} onChange={e => setF('customer', e.target.value)} placeholder="e.g. Silox India" autoFocus />
              </div>
              <div className="field col-6">
                <label>Lane</label>
                <input type="text" value={rec.forward.lane} onChange={e => setF('lane', e.target.value)} placeholder="e.g. Chanderiya — Silvassa" />
              </div>
              <div className="field col-3">
                <label>Feb Load <span className="hint">MT</span></label>
                <NumInput value={rec.forward.febLoad} onChange={v => setF('febLoad', v)} suffix="MT"/>
              </div>
              <div className="field col-3">
                <label>Distance (Actuals) <span className="hint">KM</span></label>
                <NumInput value={rec.forward.distanceKms} onChange={v => setF('distanceKms', v)} suffix="km"/>
              </div>
              <div className="field col-2">
                <label>Yield</label>
                <NumInput value={rec.forward.yieldPct} onChange={v => setF('yieldPct', v)} suffix="%"/>
              </div>
              <div className="field col-2">
                <label>Min-KMS</label>
                <NumInput value={rec.forward.minKms} onChange={v => setF('minKms', v)} suffix="km"/>
              </div>
              <div className="field col-2">
                <label>Max-KMS</label>
                <NumInput value={rec.forward.maxKms} onChange={v => setF('maxKms', v)} suffix="km"/>
              </div>
            </div>
          </div>

          {/* Returns */}
          <div className="section">
            <div className="section-head">
              <div className="section-marker accent"/>
              <div className="section-title">Return Lanes — Backhaul Priorities</div>
              <div className="section-sub">{rec.returns.length} priorit{rec.returns.length === 1 ? 'y' : 'ies'}</div>
            </div>
            <div className="returns-editor">
              {rec.returns.map((r, i) => (
                <div key={i} className="return-card">
                  <div className="return-card-head">
                    <PriBadge p={r.priority}/>
                    <input type="text" value={r.returnCustomer} onChange={e => setR(i, 'returnCustomer', e.target.value)} placeholder="Return customer (e.g. Apar + Chauhan)" />
                    <button className="btn btn-xs" onClick={() => moveReturn(i, -1)} disabled={i === 0} title="Move up">↑</button>
                    <button className="btn btn-xs" onClick={() => moveReturn(i, 1)} disabled={i === rec.returns.length - 1} title="Move down">↓</button>
                    <button className="btn btn-xs btn-danger" onClick={() => removeReturn(i)} title="Remove"><Icon.Trash/></button>
                  </div>
                  <div className="field-grid">
                    <div className="field col-12">
                      <label>Return Lane</label>
                      <input type="text" value={r.lane} onChange={e => setR(i, 'lane', e.target.value)} placeholder="e.g. Silvassa — Khavda — Mundra — Chittorgarh" />
                    </div>
                    <div className="field col-2">
                      <label>Monthly Load <span className="hint">MT</span></label>
                      <NumInput value={r.monthlyLoad} onChange={v => setR(i, 'monthlyLoad', v)} suffix="MT"/>
                    </div>
                    <div className="field col-2">
                      <label>Loaded KMS</label>
                      <NumInput value={r.distanceLoaded} onChange={v => { setR(i, 'distanceLoaded', v); setR(i, '_autoTotal', true); }} suffix="km"/>
                    </div>
                    <div className="field col-2">
                      <label>Empty KMS</label>
                      <NumInput value={r.distanceEmpty} onChange={v => { setR(i, 'distanceEmpty', v); setR(i, '_autoTotal', true); }} suffix="km"/>
                    </div>
                    <div className={`field col-2 ${r._autoTotal ? 'derived' : ''}`}>
                      <label>Total KMS {r._autoTotal && <span className="hint">auto</span>}</label>
                      <NumInput value={r.totalDistance} onChange={v => { setR(i, 'totalDistance', v); setR(i, '_autoTotal', false); }} suffix="km"/>
                    </div>
                    <div className="field col-2">
                      <label>Yield</label>
                      <NumInput value={r.yieldPct} onChange={v => setR(i, 'yieldPct', v)} suffix="%"/>
                    </div>
                    <div className="field col-2">
                      <label>Blend</label>
                      <NumInput value={r.blend} onChange={v => setR(i, 'blend', v)} suffix="%"/>
                    </div>
                  </div>
                </div>
              ))}
              <button className="add-priority" onClick={addReturn}>
                <Icon.Plus/> Add another priority (P{rec.returns.length + 1})
              </button>
            </div>
          </div>
        </div>

        <div className="drawer-footer">
          <div className="footer-meta">
            {initial?.createdAt ? (
              <>
                <span>Created {fmt.date(initial.createdAt)} · by {initial.createdBy}</span>
                {initial.updatedAt && initial.updatedAt !== initial.createdAt && (
                  <span>Last edited {fmt.date(initial.updatedAt)} · by {initial.updatedBy}</span>
                )}
              </>
            ) : (
              <span>Will be saved as <b>{currentUser?.name}</b> · {new Date().toLocaleString('en-IN')}</span>
            )}
          </div>
          <button className="btn" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" disabled={!canSave} onClick={handleSave}>
            <Icon.Check/> {isNew ? 'Create record' : 'Save changes'}
          </button>
        </div>
      </div>
    </>
  );
}

window.RecordFormDrawer = RecordFormDrawer;

  </script>

  <script type="text/babel" data-presets="react">
/* App — main entry */
const { useState: useStateA, useEffect: useEffectA, useMemo: useMemoA, useRef: useRefA, useCallback: useCallbackA } = React;

const STORAGE_KEY = 'rr.records.v1';
const USER_KEY = 'rr.user.v1';

function uid() {
  return 'r_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function loadRecords() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function persistRecords(records) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch (e) {}
}

function loadUser() {
  try {
    const raw = localStorage.getItem(USER_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}
function persistUser(u) {
  try { localStorage.setItem(USER_KEY, JSON.stringify(u)); } catch (e) {}
}

/* Seed once */
async function fetchSeed() {
  try {
    const data = window.__SEED_DATA__;
    if (!data || !data.length) return [];
    const now = new Date();
    return data.map((rec, i) => {
      const t = new Date(now.getTime() - (data.length - i) * 1000 * 60 * 60 * 6).toISOString();
      const seedUser = SEED_USERS[i % SEED_USERS.length];
      return {
        ...rec,
        id: uid(),
        createdAt: t,
        createdBy: seedUser.name,
        updatedAt: t,
        updatedBy: seedUser.name,
      };
    });
  } catch (e) {
    return [];
  }
}

/* ───────────────── Import view ─────────────── */
function ImportView({ onImport, currentUser, pushToast, recordsCount }) {
  const [drag, setDrag] = useStateA(false);
  const [preview, setPreview] = useStateA(null); // { records, filename }
  const [mode, setMode] = useStateA('append'); // append | replace
  const inputRef = useRefA(null);

  const onFiles = async (files) => {
    const file = files?.[0];
    if (!file) return;
    try {
      const records = await window.ExcelIO.parseFile(file);
      setPreview({ records, filename: file.name });
    } catch (e) {
      console.error(e);
      pushToast({ kind: 'error', msg: `Could not parse "${file.name}": ${e.message}` });
    }
  };

  const handleConfirm = () => {
    if (!preview) return;
    onImport(preview.records, mode);
    pushToast({ kind: 'success', msg: `Imported ${preview.records.length} records (${mode === 'replace' ? 'replaced' : 'appended'})` });
    setPreview(null);
  };

  return (
    <div className="import-pane">
      <div className="import-card">
        <div className="import-card-head">
          <h3>Import an Excel spreadsheet</h3>
          <p>Drop a .xlsx file matching the Ready Reckoner schema. Records will be tagged with your user id and timestamp.</p>
        </div>
        <div className="import-card-body">
          <div
            className={`dropzone ${drag ? 'dragging' : ''}`}
            onDragOver={e => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={e => { e.preventDefault(); setDrag(false); onFiles(e.dataTransfer.files); }}
            onClick={() => inputRef.current?.click()}
          >
            <Icon.Upload width="28" height="28"/>
            <h4>Drop Ready_Reckoner.xlsx here</h4>
            <p>or click to browse · .xlsx, .xls</p>
            <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={e => onFiles(e.target.files)} />
          </div>

          {preview && (
            <div className="import-preview">
              <h4>Preview · {preview.filename}</h4>
              <div className="import-summary">
                <div className="stat">
                  <div className="stat-label">Forward lanes</div>
                  <div className="stat-val">{preview.records.length}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Return priorities</div>
                  <div className="stat-val">{preview.records.reduce((a, r) => a + (r.returns?.length || 0), 0)}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Unique customers</div>
                  <div className="stat-val">{new Set(preview.records.map(r => r.forward?.customer).filter(Boolean)).size}</div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 12, fontSize: 13 }}>
                <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
                  <input type="radio" name="mode" checked={mode === 'append'} onChange={() => setMode('append')} />
                  Append to existing ({recordsCount} records)
                </label>
                <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
                  <input type="radio" name="mode" checked={mode === 'replace'} onChange={() => setMode('replace')} />
                  Replace all existing
                </label>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn" onClick={() => setPreview(null)}>Discard</button>
                <button className="btn btn-primary" onClick={handleConfirm}><Icon.Check/> Confirm import</button>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="import-card">
        <div className="import-card-head">
          <h3>Expected schema</h3>
          <p>Two row headers: <i>Forward Lane (Customer Origin)</i> spanning A–G, <i>Return Lane (Backhaul)</i> spanning H–P.</p>
        </div>
        <div className="import-card-body">
          <div className="schema-grid">
            <div className="schema-col">
              <h5 className="fwd">Forward Lane · columns A–G</h5>
              <ul className="schema-list">
                {window.ExcelIO.FWD_COLS.map((c, i) => (
                  <li key={c.key}><span>{c.label}</span><span className="col-letter">{String.fromCharCode(65 + i)}</span></li>
                ))}
              </ul>
            </div>
            <div className="schema-col">
              <h5 className="ret">Return Lane · columns H–P</h5>
              <ul className="schema-list">
                {window.ExcelIO.RET_COLS.map((c, i) => (
                  <li key={c.key}><span>{c.label}</span><span className="col-letter">{String.fromCharCode(72 + i)}</span></li>
                ))}
              </ul>
            </div>
          </div>
          <div style={{ marginTop: 14, fontSize: 12, color: 'var(--text-mut)' }}>
            Multiple return rows can share one forward lane — leave A–G blank to continue the previous forward lane (same as the original sheet).
          </div>
        </div>
      </div>
    </div>
  );
}

/* ───────────────── App ─────────────── */
function App() {
  const [user, setUser] = useStateA(() => loadUser());
  const [records, setRecords] = useStateA(null); // null = not loaded yet
  const [tab, setTab] = useStateA('records');
  const [query, setQuery] = useStateA('');
  const [editing, setEditing] = useStateA(null); // { record, isNew }
  const [toasts, setToasts] = useStateA([]);
  const toastIdRef = useRefA(0);

  // Bootstrap records
  useEffectA(() => {
    (async () => {
      const stored = loadRecords();
      if (stored && stored.length) {
        setRecords(stored);
        return;
      }
      const seed = await fetchSeed();
      setRecords(seed);
      persistRecords(seed);
    })();
  }, []);

  // Persist on change
  useEffectA(() => {
    if (records) persistRecords(records);
  }, [records]);

  const pushToast = useCallbackA((t) => {
    const id = ++toastIdRef.current;
    setToasts(prev => [...prev, { ...t, id }]);
    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 2800);
  }, []);

  if (!user) {
    return <LoginModal onLogin={(u) => { setUser(u); persistUser(u); }} />;
  }

  if (records === null) {
    return <div style={{ padding: 40, color: 'var(--text-mut)' }}>Loading…</div>;
  }

  const handleSave = (payload) => {
    const now = new Date().toISOString();
    if (editing.isNew) {
      const rec = {
        ...payload,
        id: uid(),
        createdAt: now,
        createdBy: user.name,
        createdById: user.id,
        updatedAt: now,
        updatedBy: user.name,
        updatedById: user.id,
      };
      setRecords(prev => [rec, ...prev]);
      pushToast({ kind: 'success', msg: `Created record for ${rec.forward.customer}` });
    } else {
      setRecords(prev => prev.map(r => r.id === editing.record.id
        ? { ...r, ...payload, updatedAt: now, updatedBy: user.name, updatedById: user.id }
        : r));
      pushToast({ kind: 'success', msg: `Saved changes to ${payload.forward.customer}` });
    }
    setEditing(null);
  };

  const handleDelete = (rec) => {
    setRecords(prev => prev.filter(r => r.id !== rec.id));
    pushToast({ kind: 'success', msg: `Deleted ${rec.forward.customer}` });
  };

  const handleExport = () => {
    const filename = `Ready_Reckoner_${new Date().toISOString().slice(0,10)}.xlsx`;
    window.ExcelIO.exportRecords(records, filename);
    pushToast({ kind: 'success', msg: `Exported ${records.length} records → ${filename}` });
  };

  const handleImport = (incoming, mode) => {
    const now = new Date().toISOString();
    const stamped = incoming.map(rec => ({
      ...rec,
      id: uid(),
      createdAt: now,
      createdBy: user.name,
      createdById: user.id,
      updatedAt: now,
      updatedBy: user.name,
      updatedById: user.id,
      _imported: true,
    }));
    if (mode === 'replace') setRecords(stamped);
    else setRecords(prev => [...stamped, ...prev]);
    setTab('records');
  };

  const totalReturns = records.reduce((a, r) => a + (r.returns?.length || 0), 0);
  const uniqCust = new Set(records.map(r => r.forward?.customer).filter(Boolean)).size;
  const avgYield = (() => {
    const ys = records.map(r => r.forward?.yieldPct).filter(v => v != null && v !== '');
    if (!ys.length) return null;
    return ys.reduce((a, b) => a + +b, 0) / ys.length;
  })();

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark">RR</div>
          <div>
            <div className="brand-name">Ready Reckoner</div>
            <div className="brand-sub">Lane Yield Tracker</div>
          </div>
        </div>
        <div className="topbar-divider"/>
        <nav className="topbar-tabs">
          <button className={`tab ${tab === 'records' ? 'active' : ''}`} onClick={() => setTab('records')}>
            Records <span className="tab-count">{records.length}</span>
          </button>
          <button className={`tab ${tab === 'import' ? 'active' : ''}`} onClick={() => setTab('import')}>
            Import / Export
          </button>
        </nav>
        <button className="user-pill" onClick={() => {
          if (confirm(`Sign out ${user.name}?`)) { localStorage.removeItem(USER_KEY); setUser(null); }
        }}>
          <div className="user-avatar">{initials(user.name)}</div>
          <span className="user-name">{user.name}</span>
          <span className="user-role">· {user.role}</span>
        </button>
      </header>

      <main className="main">
        {tab === 'records' && (
          <>
            <div className="actionbar">
              <div className="stat-group">
                <div className="stat">
                  <span className="stat-label">Forward lanes</span>
                  <span className="stat-val">{records.length}</span>
                </div>
                <div className="stat">
                  <span className="stat-label">Return priorities</span>
                  <span className="stat-val">{totalReturns}</span>
                </div>
                <div className="stat">
                  <span className="stat-label">Customers</span>
                  <span className="stat-val">{uniqCust}</span>
                </div>
                <div className="stat">
                  <span className="stat-label">Avg forward yield</span>
                  <span className="stat-val">{avgYield != null ? avgYield.toFixed(1) : '—'}<span className="unit">%</span></span>
                </div>
              </div>
              <div className="search-input">
                <Icon.Search/>
                <input placeholder="Search customer, lane, priority…" value={query} onChange={e => setQuery(e.target.value)} />
              </div>
              <button className="btn" onClick={handleExport}><Icon.Download/> Export .xlsx</button>
              <button className="btn btn-primary" onClick={() => setEditing({ record: null, isNew: true })}>
                <Icon.Plus/> New record
              </button>
            </div>
            <RecordsTable
              records={records}
              onEdit={(r) => setEditing({ record: r, isNew: false })}
              onDelete={handleDelete}
              onAdd={() => setEditing({ record: null, isNew: true })}
              query={query}
            />
          </>
        )}
        {tab === 'import' && (
          <ImportView
            onImport={handleImport}
            currentUser={user}
            pushToast={pushToast}
            recordsCount={records.length}
          />
        )}
      </main>

      {editing && (
        <RecordFormDrawer
          initial={editing.record}
          isNew={editing.isNew}
          currentUser={user}
          onCancel={() => setEditing(null)}
          onSave={handleSave}
        />
      )}

      <ToastStack toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
