name: Build Windows exe

on:
  push:
    branches: [main]
    paths:
      - 'electron-main.js'
      - 'package.json'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win

      - name: Publish to GitHub Releases
        shell: bash
        run: |
          gh release delete v1.0.0 --yes 2>/dev/null || true
          gh release create v1.0.0 dist/*.exe \
            --title "Ready Reckoner v1.0.0 — Windows" \
            --notes "Windows installer. Double-click to install, then launch ReadyReckoner from the Start menu."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
